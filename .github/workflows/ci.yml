name: CI

on:
  push:
    branches: [main, ci-cd]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: waldo_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/waldo_db_test?schema=public" >> .env
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env
          echo "PORT=3000" >> .env
          echo "FRONTEND_URL=http://localhost:5173" >> .env
          echo "GOOGLE_CLIENT_ID=test" >> .env
          echo "GOOGLE_CLIENT_SECRET=test" >> .env
          echo "GOOGLE_CALLBACK_URL=http://localhost:3000/auth/google/callback" >> .env
          echo "GITHUB_CLIENT_ID=test" >> .env
          echo "GITHUB_CLIENT_SECRET=test" >> .env
          echo "GITHUB_CALLBACK_URL=http://localhost:3000/auth/github/callback" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma db push

      - name: Run tests
        run: npm test
